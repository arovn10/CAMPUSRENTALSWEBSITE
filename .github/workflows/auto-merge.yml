name: Auto-merge PR

# Enables GitHub native auto-merge on PRs labelled "automerge". The PR then merges
# itself ONLY after required status checks pass (configure branch protection on
# main to require "PR Build Check"). This keeps merges hands-off without bypassing
# the build gate that protects the live site.
#
# ONE-TIME REPO SETUP (Settings):
#   1. General → Pull Requests → enable "Allow auto-merge".
#   2. Branches → add protection rule for `main` → "Require status checks to pass"
#      → select "PR Build Check". (Optional: require linear history / squash.)
# Then label any PR `automerge` to have it merge automatically once green.

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: contains(github.event.pull_request.labels.*.name, 'automerge') && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
